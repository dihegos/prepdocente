{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold mb-3 text-center">🔐 Iniciar sesión</h2>
                <p class="text-muted text-center mb-4">
                    Entra a tu cuenta para continuar estudiando.
                </p>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <button type="submit" class="btn-duolingo-pro w-100">
                        Entrar
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">¿No tienes cuenta?</span>
                    <a href="{{ url_for('main.register') }}">Crear cuenta</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
