{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold mb-3 text-center">✨ Crear cuenta</h2>
                <p class="text-muted text-center mb-4">
                    Solo pueden registrarse personas con código de invitación.
                </p>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo (opcional)</label>
                        <input type="email" name="email" class="form-control form-control-lg rounded-4">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Confirmar contraseña</label>
                        <input type="password" name="confirm_password" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Código de invitación</label>
                        <input type="text" name="invite_code" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <button type="submit" class="btn-duolingo-pro w-100">
                        Crear cuenta
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">¿Ya tienes cuenta?</span>
                    <a href="{{ url_for('main.login') }}">Iniciar sesión</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
